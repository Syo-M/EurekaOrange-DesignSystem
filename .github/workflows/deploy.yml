name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build Storybook
        run: npm run build-storybook

      - name: Prepare Pages artifact
        run: |
          # docs/ ページ群を _site/docs/ に配置
          mkdir -p _site/docs _site/storybook
          cp docs/*.html _site/docs/
          cp docs/*.js  _site/docs/
          cp docs/*.jsx _site/docs/ 2>/dev/null || true
          # 共有 CSS は _site/ ルートに置く（docs/*.html から ../eureka-orange.css で参照）
          cp eureka-orange.css _site/
          cp tailwind.config.js _site/ 2>/dev/null || true
          # ルートへのアクセスを docs/index.html にリダイレクト
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0; url=docs/index.html">
            <title>EurekaOrange Design System</title>
          </head>
          <body>
            <p><a href="docs/index.html">EurekaOrange Design System</a></p>
          </body>
          </html>
          EOF
          # Storybook ビルドを _site/storybook/ に配置
          cp -r storybook-static/. _site/storybook/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build Storybook
        run: npm run build-storybook

      - name: Prepare Pages artifact
        run: |
          # Copy HTML pages + assets to _site/
          mkdir -p _site/storybook
          cp *.html _site/ 2>/dev/null || true
          cp eureka-orange.css _site/
          cp nav.js _site/
          cp tailwind.config.js _site/ 2>/dev/null || true
          # Copy Storybook build into _site/storybook/
          cp -r storybook-static/. _site/storybook/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

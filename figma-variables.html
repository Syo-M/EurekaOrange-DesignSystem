<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EurekaOrange — Figma Variables Export</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0b;--surface:#131311;--raised:#1a1a17;--border:rgba(255,255,255,0.07);
  --jade:#1ecfa3;--jade-l:#52e2bc;--jade-d:#0fb389;
  --t1:#fff;--t2:#9b9a91;--t3:#6e6d63;--t4:#484740;
  --fd:'Space Grotesk',sans-serif;--fm:'DM Mono',monospace;
}
body{font-family:var(--fd);background:var(--bg);color:var(--t1);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:#2e2d28;border-radius:3px}
::selection{background:rgba(30,207,163,0.25)}
pre{white-space:pre-wrap;word-break:break-all}
</style>
<script src="nav.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

/* ── helpers ──────────────────────────────────────────── */
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  return { r, g, b, a: 1 };
}
function rgbaToFigma(rgba) {
  const m = rgba.match(/rgba?\(([^)]+)\)/);
  if (!m) return { r:0,g:0,b:0,a:1 };
  const [r,g,b,a=1] = m[1].split(',').map(Number);
  return { r:r/255, g:g/255, b:b/255, a:parseFloat(a) };
}
function toFigmaColor(val) {
  if (val.startsWith('#')) return hexToRgb(val);
  if (val.startsWith('rgba') || val.startsWith('rgb')) return rgbaToFigma(val);
  return null;
}

/* ── Raw tokens ───────────────────────────────────────── */
const PRIMITIVE = {
  'jade/50':  '#e8fdf6', 'jade/100': '#c4f7e8', 'jade/200': '#8eefd4',
  'jade/300': '#52e2bc', 'jade/400': '#1ecfa3', 'jade/500': '#0fb389',
  'jade/600': '#098f6d', 'jade/700': '#066b51', 'jade/800': '#034636', 'jade/900': '#01231b',
  'ink/0':    '#ffffff', 'ink/50':   '#f5f5f3', 'ink/100':  '#e8e7e3',
  'ink/200':  '#c8c7c0', 'ink/300':  '#9b9a91', 'ink/400':  '#6e6d63',
  'ink/500':  '#484740', 'ink/600':  '#2e2d28', 'ink/700':  '#1c1b18',
  'ink/800':  '#111110', 'ink/900':  '#080807',
  'status/success': '#22c55e', 'status/warning': '#f59e0b',
  'status/error':   '#ef4444', 'status/info':    '#3b82f6',
  'accent/electric': '#a855f7', 'accent/acid': '#84cc16', 'accent/ice': '#06b6d4',
};

const SEMANTIC_DARK = {
  'surface/background': '#0d0d0b', 'surface/base':    '#131311',
  'surface/raised':     '#1a1a17', 'surface/overlay': '#222220',
  'surface/border':     'rgba(255,255,255,0.07)',
  'text/primary': '#ffffff',       'text/secondary':  '#9b9a91',
  'text/tertiary': '#6e6d63',      'text/disabled':   '#484740',
  'text/on-accent': '#0d0d0b',
  'accent/default': '#1ecfa3',     'accent/hover':    '#52e2bc',
  'accent/active':  '#0fb389',     'accent/subtle':   'rgba(30,207,163,0.12)',
  'accent/border':  'rgba(30,207,163,0.30)',
  'accent/glow':    'rgba(30,207,163,0.35)',
  'focus/ring':     'rgba(30,207,163,0.45)',
  'status/success': '#22c55e',     'status/warning':  '#f59e0b',
  'status/error':   '#ef4444',     'status/info':     '#3b82f6',
};

const SEMANTIC_LIGHT = {
  'surface/background': '#f8f8f6', 'surface/base':    '#ffffff',
  'surface/raised':     '#f2f2ef', 'surface/overlay': '#eaeae6',
  'surface/border':     'rgba(0,0,0,0.08)',
  'text/primary': '#111110',       'text/secondary':  '#484740',
  'text/tertiary': '#6e6d63',      'text/disabled':   '#9b9a91',
  'text/on-accent': '#ffffff',
  'accent/default': '#0fb389',     'accent/hover':    '#1ecfa3',
  'accent/active':  '#098f6d',     'accent/subtle':   'rgba(15,179,137,0.10)',
  'accent/border':  'rgba(15,179,137,0.30)',
  'accent/glow':    'rgba(15,179,137,0.20)',
  'focus/ring':     'rgba(15,179,137,0.40)',
  'status/success': '#16a34a',     'status/warning':  '#d97706',
  'status/error':   '#dc2626',     'status/info':     '#2563eb',
};

const SPACING = {
  'spacing/1': 4,   'spacing/2': 8,    'spacing/3': 12,  'spacing/4': 16,
  'spacing/5': 20,  'spacing/6': 24,   'spacing/7': 28,  'spacing/8': 32,
  'spacing/9': 36,  'spacing/10': 40,  'spacing/12': 48, 'spacing/14': 56,
  'spacing/16': 64, 'spacing/20': 80,  'spacing/24': 96, 'spacing/28': 112,
  'spacing/32': 128,
};

const RADIUS = {
  'radius/sm': 4,  'radius/md': 8,   'radius/lg': 12,
  'radius/xl': 16, 'radius/2xl': 20, 'radius/3xl': 28,
  'radius/4xl': 32,'radius/full': 9999,
};

const TYPE_SIZE = {
  'font-size/xs': 12,  'font-size/sm': 14,  'font-size/base': 16,
  'font-size/lg': 18,  'font-size/xl': 20,  'font-size/2xl': 24,
  'font-size/3xl': 30, 'font-size/4xl': 36, 'font-size/5xl': 48,
  'font-size/6xl': 60, 'font-size/7xl': 72, 'font-size/8xl': 96,
};

const DURATION = {
  'duration/instant': 80, 'duration/fast': 150, 'duration/normal': 220,
  'duration/slow': 350,   'duration/crawl': 500,
};

/* ── Build Figma JSON ─────────────────────────────────── */
function buildFigmaJSON(includeMode) {
  const collections = [];

  // 1. Primitives
  const primVars = [];
  Object.entries(PRIMITIVE).forEach(([name, val]) => {
    const col = toFigmaColor(val);
    if (col) primVars.push({ name, type: 'COLOR', value: col, scopes: ['ALL_SCOPES'] });
  });
  Object.entries(SPACING).forEach(([name, val]) => {
    primVars.push({ name, type: 'FLOAT', value: val, scopes: ['WIDTH_HEIGHT','GAP'] });
  });
  Object.entries(RADIUS).forEach(([name, val]) => {
    primVars.push({ name, type: 'FLOAT', value: val, scopes: ['CORNER_RADIUS'] });
  });
  Object.entries(TYPE_SIZE).forEach(([name, val]) => {
    primVars.push({ name, type: 'FLOAT', value: val, scopes: ['FONT_SIZE'] });
  });
  Object.entries(DURATION).forEach(([name, val]) => {
    primVars.push({ name, type: 'FLOAT', value: val, scopes: ['ALL_SCOPES'] });
  });
  collections.push({ name: 'Primitives', defaultModeName: 'Value', modes: [{ name: 'Value', variables: primVars }] });

  // 2. Semantic (Dark + optionally Light)
  const semanticModes = [
    { name: 'Dark', variables: Object.entries(SEMANTIC_DARK).map(([name, val]) => {
      const col = toFigmaColor(val);
      return col ? { name, type: 'COLOR', value: col, scopes: ['ALL_SCOPES'] } : null;
    }).filter(Boolean) }
  ];
  if (includeMode) {
    semanticModes.push({ name: 'Light', variables: Object.entries(SEMANTIC_LIGHT).map(([name, val]) => {
      const col = toFigmaColor(val);
      return col ? { name, type: 'COLOR', value: col, scopes: ['ALL_SCOPES'] } : null;
    }).filter(Boolean) });
  }
  collections.push({ name: 'Semantic', defaultModeName: 'Dark', modes: semanticModes });

  return {
    version: '1.0',
    metadata: { source: 'EurekaOrange Design System', date: '2025-05-02', generator: 'eureka-orange-figma-export' },
    collections,
  };
}

/* ── App ──────────────────────────────────────────────── */
function App() {
  const [tab, setTab] = useState('preview');
  const [includeLight, setIncludeLight] = useState(true);
  const [collection, setCollection] = useState('all');
  const [copied, setCopied] = useState(false);

  const json = useMemo(() => buildFigmaJSON(includeLight), [includeLight]);
  const jsonStr = JSON.stringify(json, null, 2);

  const download = () => {
    const blob = new Blob([jsonStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = 'eureka-orange-figma-variables.json'; a.click();
    URL.revokeObjectURL(url);
  };

  const copy = () => {
    navigator.clipboard?.writeText(jsonStr).catch(()=>{});
    setCopied(true); setTimeout(() => setCopied(false), 2000);
  };

  const totalVars = json.collections.reduce((s, c) => s + c.modes.reduce((ms, m) => ms + m.variables.length, 0), 0);

  /* Preview rows */
  const previewData = [
    { title: 'Primitives — Color', items: Object.entries(PRIMITIVE).filter(([k]) => k.includes('/')).slice(0, 20) },
    { title: 'Semantic — Dark', items: Object.entries(SEMANTIC_DARK) },
    ...(includeLight ? [{ title: 'Semantic — Light', items: Object.entries(SEMANTIC_LIGHT) }] : []),
    { title: 'Spacing', items: Object.entries(SPACING).map(([k,v]) => [k, `${v}px`]) },
    { title: 'Radius', items: Object.entries(RADIUS).map(([k,v]) => [k, `${v}px`]) },
    { title: 'Font Size', items: Object.entries(TYPE_SIZE).map(([k,v]) => [k, `${v}px`]) },
    { title: 'Duration', items: Object.entries(DURATION).map(([k,v]) => [k, `${v}ms`]) },
  ];

  const collectionTabs = ['all', ...json.collections.map(c => c.name)];

  return (
    <div style={{ minHeight: '100vh' }}>
      {/* Nav */}
      <div style={{ position: 'sticky', top: 0, zIndex: 50, background: 'rgba(13,13,11,0.92)', backdropFilter: 'blur(20px)', borderBottom: '1px solid var(--border)', padding: '0 40px', height: '56px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
          <a href="EurekaOrange Design System.html" style={{ fontFamily: 'var(--fm)', fontSize: '12px', color: 'var(--t3)', textDecoration: 'none' }}>← Design System</a>
          <div style={{ width: '1px', height: '16px', background: 'var(--border)' }} />
          <span style={{ fontWeight: 600, fontSize: '14px' }}>Figma Variables Export</span>
          <span style={{ fontFamily: 'var(--fm)', fontSize: '10px', color: 'var(--jade)', background: 'rgba(30,207,163,0.1)', padding: '2px 8px', borderRadius: '12px', border: '1px solid rgba(30,207,163,0.2)' }}>
            {totalVars} variables
          </span>
        </div>
        <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
          {/* Light mode toggle */}
          <label style={{ display: 'flex', alignItems: 'center', gap: '8px', cursor: 'pointer', fontSize: '13px', color: 'var(--t2)' }}>
            <div onClick={() => setIncludeLight(!includeLight)} style={{ width: '36px', height: '20px', borderRadius: '10px', background: includeLight ? 'var(--jade)' : 'var(--raised)', border: '1px solid var(--border)', position: 'relative', cursor: 'pointer', transition: 'background 0.2s' }}>
              <div style={{ position: 'absolute', top: '3px', left: includeLight ? '19px' : '3px', width: '12px', height: '12px', borderRadius: '50%', background: '#fff', transition: 'left 0.2s' }} />
            </div>
            Light mode
          </label>
          <button onClick={copy} style={{ background: 'rgba(255,255,255,0.05)', border: '1px solid var(--border)', color: copied ? 'var(--jade)' : 'var(--t2)', fontFamily: 'var(--fm)', fontSize: '12px', padding: '7px 16px', borderRadius: '7px', cursor: 'pointer', transition: 'color 0.2s' }}>
            {copied ? '✓ Copied' : 'Copy JSON'}
          </button>
          <button onClick={download} style={{ background: 'var(--jade)', color: '#0d0d0b', border: 'none', fontFamily: 'var(--fd)', fontWeight: 600, fontSize: '13px', padding: '8px 20px', borderRadius: '7px', cursor: 'pointer' }}>
            ↓ Download .json
          </button>
        </div>
      </div>

      <div style={{ padding: '40px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '32px', maxWidth: '1400px', margin: '0 auto' }}>

        {/* Left — instructions */}
        <div>
          <div style={{ marginBottom: '32px' }}>
            <div style={{ fontFamily: 'var(--fm)', fontSize: '11px', color: 'var(--jade)', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: '12px', display: 'flex', alignItems: 'center', gap: '8px' }}>
              <span style={{ display: 'inline-block', width: '20px', height: '1px', background: 'var(--jade)' }} />
              Figma Variables
            </div>
            <h1 style={{ fontWeight: 700, fontSize: '36px', letterSpacing: '-0.03em', marginBottom: '10px', lineHeight: 1 }}>
              Import to<br />
              <span style={{ background: 'linear-gradient(135deg, #52e2bc, #1ecfa3)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>Figma</span>
            </h1>
            <p style={{ color: 'var(--t2)', fontSize: '14px', lineHeight: 1.7 }}>
              EurekaOrange の全トークンをFigma Variables形式でエクスポート。Figma Variables Import Pluginで読み込むだけでデザインシステムが完成します。
            </p>
          </div>

          {/* How to import */}
          <div style={{ background: 'var(--raised)', border: '1px solid var(--border)', borderRadius: '16px', padding: '24px', marginBottom: '24px' }}>
            <div style={{ fontFamily: 'var(--fm)', fontSize: '11px', color: 'var(--jade)', marginBottom: '16px', letterSpacing: '0.08em' }}>─── Import手順</div>
            {[
              { n: '01', title: 'JSONをダウンロード', body: '右上の「Download .json」ボタンからファイルを保存' },
              { n: '02', title: 'Figmaでプラグインを開く', body: 'Plugins → Variables Import (Community) を検索してインストール' },
              { n: '03', title: 'JSONをインポート', body: 'プラグインで「Import from JSON」→ ダウンロードしたファイルを選択' },
              { n: '04', title: 'Modeを確認', body: 'Semantic コレクションに「Dark」「Light」の2 Mode が作成される' },
              { n: '05', title: 'バインド', body: 'コンポーネントのFillやTextにVariableをバインドしてテーマ切替を実現' },
            ].map(s => (
              <div key={s.n} style={{ display: 'flex', gap: '16px', marginBottom: '16px', alignItems: 'flex-start' }}>
                <div style={{ width: '28px', height: '28px', borderRadius: '8px', background: 'rgba(30,207,163,0.12)', border: '1px solid rgba(30,207,163,0.25)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, fontFamily: 'var(--fm)', fontSize: '10px', color: 'var(--jade)' }}>{s.n}</div>
                <div>
                  <div style={{ fontSize: '13px', fontWeight: 600, marginBottom: '3px' }}>{s.title}</div>
                  <div style={{ fontSize: '12px', color: 'var(--t3)', lineHeight: 1.6 }}>{s.body}</div>
                </div>
              </div>
            ))}
          </div>

          {/* Collections summary */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
            {json.collections.map(col => (
              <div key={col.name} style={{ background: 'var(--raised)', border: '1px solid var(--border)', borderRadius: '12px', padding: '16px 20px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div>
                  <div style={{ fontSize: '14px', fontWeight: 600, marginBottom: '3px' }}>{col.name}</div>
                  <div style={{ fontFamily: 'var(--fm)', fontSize: '11px', color: 'var(--t3)' }}>
                    {col.modes.map(m => `${m.name} (${m.variables.length})`).join(' · ')}
                  </div>
                </div>
                <div style={{ fontFamily: 'var(--fm)', fontSize: '20px', fontWeight: 700, color: 'var(--jade)' }}>
                  {col.modes.reduce((s, m) => s + m.variables.length, 0)}
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Right — JSON preview */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
          {/* Tab switcher */}
          <div style={{ display: 'flex', gap: '6px' }}>
            {['preview', 'json'].map(t => (
              <button key={t} onClick={() => setTab(t)} style={{
                padding: '7px 18px', borderRadius: '8px', border: 'none', cursor: 'pointer',
                fontFamily: 'var(--fm)', fontSize: '12px',
                background: tab === t ? 'var(--jade)' : 'var(--raised)',
                color: tab === t ? '#0d0d0b' : 'var(--t3)',
                border: tab === t ? 'none' : '1px solid var(--border)',
              }}>{t === 'preview' ? 'Visual Preview' : 'Raw JSON'}</button>
            ))}
          </div>

          {tab === 'preview' ? (
            <div style={{ background: 'var(--raised)', border: '1px solid var(--border)', borderRadius: '16px', overflow: 'hidden', maxHeight: 'calc(100vh - 200px)', overflowY: 'auto' }}>
              {previewData.map(section => (
                <div key={section.title}>
                  <div style={{ padding: '12px 20px', background: 'rgba(30,207,163,0.05)', borderBottom: '1px solid var(--border)', fontFamily: 'var(--fm)', fontSize: '11px', color: 'var(--jade)', letterSpacing: '0.08em' }}>
                    {section.title} — {section.items.length} vars
                  </div>
                  {section.items.map(([name, val]) => {
                    const isColor = val.startsWith('#') || val.startsWith('rgba') || val.startsWith('rgb');
                    return (
                      <div key={name} style={{ padding: '10px 20px', borderBottom: '1px solid rgba(255,255,255,0.03)', display: 'flex', alignItems: 'center', gap: '12px' }}>
                        {isColor ? (
                          <div style={{ width: '20px', height: '20px', borderRadius: '5px', background: val, flexShrink: 0, border: val === '#ffffff' ? '1px solid rgba(0,0,0,0.1)' : 'none' }} />
                        ) : (
                          <div style={{ width: '20px', height: '20px', borderRadius: '5px', background: 'var(--overlay)', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '9px', color: 'var(--jade)', fontFamily: 'var(--fm)' }}>N</div>
                        )}
                        <div style={{ flex: 1, fontFamily: 'var(--fm)', fontSize: '12px', color: 'var(--jade)' }}>{name}</div>
                        <div style={{ fontFamily: 'var(--fm)', fontSize: '11px', color: 'var(--t4)' }}>{val}</div>
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          ) : (
            <div style={{ position: 'relative' }}>
              <div style={{ background: '#080807', border: '1px solid var(--border)', borderRadius: '16px', padding: '20px', maxHeight: 'calc(100vh - 200px)', overflowY: 'auto' }}>
                <pre style={{ fontFamily: 'var(--fm)', fontSize: '11px', color: '#c8c7c0', lineHeight: 1.7 }}>{jsonStr}</pre>
              </div>
              <button onClick={copy} style={{ position: 'absolute', top: '12px', right: '12px', background: copied ? 'rgba(30,207,163,0.15)' : 'rgba(255,255,255,0.06)', border: '1px solid var(--border)', color: copied ? 'var(--jade)' : 'var(--t3)', fontFamily: 'var(--fm)', fontSize: '11px', padding: '5px 12px', borderRadius: '6px', cursor: 'pointer' }}>
                {copied ? '✓ Copied' : 'Copy'}
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

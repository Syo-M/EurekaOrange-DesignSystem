const CATEGORIES = ['All', ...Array.from(new Set(ALL_TOKENS.map(t => t.category.split(' / ')[0])))];

function TokenRow({ token, even }) {
  const [copied, setCopied] = useState(false);
  const copy = (text) => {
    navigator.clipboard?.writeText(text).catch(()=>{});
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };

  const preview = () => {
    if (token.type === 'color') return (
      <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
        <div style={{
          width: '28px', height: '28px', borderRadius: '6px',
          background: token.value,
          border: token.value === '#ffffff' ? '1px solid rgba(0,0,0,0.15)' : 'none',
          flexShrink: 0,
        }}></div>
        <span style={{ fontFamily: 'var(--font-mono)', fontSize: '12px', color: '#9b9a91' }}>{token.value}</span>
      </div>
    );
    if (token.type === 'size') return (
      <span style={{ fontFamily: 'var(--font-mono)', fontSize: '12px', color: '#9b9a91' }}>
        {token.value}{token.px ? ` (${token.px})` : ''}
      </span>
    );
    if (token.type === 'shadow') return (
      <div style={{
        width: '28px', height: '28px', borderRadius: '6px',
        background: token.token.includes('glow') ? '#1ecfa3' : '#2e2d28',
        boxShadow: token.value, flexShrink: 0,
      }}></div>
    );
    if (token.type === 'font') return (
      <span style={{ fontFamily: token.value, fontSize: '14px', color: '#9b9a91' }}>Aa</span>
    );
    return null;
  };

  return (
    <tr style={{
      background: even ? 'rgba(255,255,255,0.015)' : 'transparent',
      transition: 'background 0.15s',
    }}
    onMouseEnter={e => e.currentTarget.style.background = 'rgba(30,207,163,0.05)'}
    onMouseLeave={e => e.currentTarget.style.background = even ? 'rgba(255,255,255,0.015)' : 'transparent'}
    >
      <td style={{ padding: '12px 20px', whiteSpace: 'nowrap' }}>
        <span style={{
          fontFamily: 'var(--font-mono)', fontSize: '12px',
          color: '#52e2bc', letterSpacing: '0.02em',
        }}>{token.token}</span>
      </td>
      <td style={{ padding: '12px 20px' }}>{preview()}</td>
      <td style={{ padding: '12px 20px' }}>
        <span style={{
          fontFamily: 'var(--font-mono)', fontSize: '11px',
          color: '#6e6d63',
          background: 'rgba(255,255,255,0.03)',
          padding: '3px 8px', borderRadius: '4px',
          border: '1px solid rgba(255,255,255,0.05)',
        }}>{token.category}</span>
      </td>
      <td style={{ padding: '12px 20px', textAlign: 'right' }}>
        <button onClick={() => copy(token.token)} style={{
          background: 'none', border: '1px solid rgba(255,255,255,0.08)',
          color: copied ? '#1ecfa3' : '#6e6d63',
          fontFamily: 'var(--font-mono)', fontSize: '11px',
          padding: '4px 10px', borderRadius: '4px', cursor: 'pointer',
          transition: 'all 0.2s',
        }}>{copied ? '✓ copied' : 'copy token'}</button>
      </td>
    </tr>
  );
}

function App() {
  const [search, setSearch] = useState('');
  const [activeCat, setActiveCat] = useState('All');

  const filtered = useMemo(() => {
    return ALL_TOKENS.filter(t => {
      const matchCat = activeCat === 'All' || t.category.startsWith(activeCat);
      const matchSearch = !search || t.token.toLowerCase().includes(search.toLowerCase()) || t.value.toLowerCase().includes(search.toLowerCase());
      return matchCat && matchSearch;
    });
  }, [search, activeCat]);

  // Export as CSS
  const exportCSS = () => {
    const lines = [':root {'];
    ALL_TOKENS.forEach(t => {
      lines.push(`  ${t.token}: ${t.value};`);
    });
    lines.push('}');
    const blob = new Blob([lines.join('\n')], { type: 'text/css' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'eureka-orange-tokens.css'; a.click();
    URL.revokeObjectURL(url);
  };

  // Export as JSON
  const exportJSON = () => {
    const obj = {};
    ALL_TOKENS.forEach(t => { obj[t.token.replace('--', '')] = t.value; });
    const blob = new Blob([JSON.stringify(obj, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'eureka-orange-tokens.json'; a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>

      {/* Header */}
      <div style={{
        borderBottom: '1px solid rgba(255,255,255,0.06)',
        padding: '0 40px',
        background: 'rgba(13,13,11,0.95)',
        backdropFilter: 'blur(20px)',
        position: 'sticky', top: 0, zIndex: 10,
      }}>
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          height: '56px',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '20px' }}>
            <a href="EurekaOrange Design System.html" style={{
              display: 'flex', alignItems: 'center', gap: '8px',
              textDecoration: 'none', color: '#9b9a91',
              fontFamily: 'var(--font-mono)', fontSize: '12px',
            }}>← Design System</a>
            <div style={{ width: '1px', height: '16px', background: 'rgba(255,255,255,0.1)' }}></div>
            <span style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: '14px' }}>Token Reference</span>
            <span style={{
              fontFamily: 'var(--font-mono)', fontSize: '10px',
              color: '#1ecfa3', background: 'rgba(30,207,163,0.1)',
              padding: '2px 8px', borderRadius: '12px',
              border: '1px solid rgba(30,207,163,0.2)',
            }}>{ALL_TOKENS.length} tokens</span>
          </div>
          <div style={{ display: 'flex', gap: '8px' }}>
            <button onClick={exportCSS} style={{
              background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.08)',
              color: '#9b9a91', fontFamily: 'var(--font-mono)', fontSize: '12px',
              padding: '7px 16px', borderRadius: '6px', cursor: 'pointer',
              transition: 'all 0.2s',
            }}>↓ CSS</button>
            <button onClick={exportJSON} style={{
              background: 'rgba(255,255,255,0.04)', border: '1px solid rgba(255,255,255,0.08)',
              color: '#9b9a91', fontFamily: 'var(--font-mono)', fontSize: '12px',
              padding: '7px 16px', borderRadius: '6px', cursor: 'pointer',
              transition: 'all 0.2s',
            }}>↓ JSON</button>
          </div>
        </div>

        {/* Search + filters */}
        <div style={{ display: 'flex', gap: '12px', alignItems: 'center', paddingBottom: '16px' }}>
          <input
            type="text"
            placeholder="Search tokens…"
            value={search}
            onChange={e => setSearch(e.target.value)}
            style={{
              background: 'rgba(255,255,255,0.04)',
              border: `1px solid ${search ? 'rgba(30,207,163,0.4)' : 'rgba(255,255,255,0.08)'}`,
              color: '#fff', fontFamily: 'var(--font-mono)', fontSize: '13px',
              padding: '8px 16px', borderRadius: '8px', outline: 'none',
              width: '260px', transition: 'border-color 0.2s',
            }}
          />
          <div style={{ display: 'flex', gap: '6px' }}>
            {CATEGORIES.map(cat => (
              <button key={cat} onClick={() => setActiveCat(cat)} style={{
                background: activeCat === cat ? 'rgba(30,207,163,0.12)' : 'transparent',
                border: activeCat === cat ? '1px solid rgba(30,207,163,0.3)' : '1px solid rgba(255,255,255,0.07)',
                color: activeCat === cat ? '#52e2bc' : '#6e6d63',
                fontFamily: 'var(--font-mono)', fontSize: '11px', letterSpacing: '0.05em',
                padding: '5px 12px', borderRadius: '6px', cursor: 'pointer',
                transition: 'all 0.2s',
              }}>{cat}</button>
            ))}
          </div>
          <div style={{ marginLeft: 'auto', fontFamily: 'var(--font-mono)', fontSize: '11px', color: '#6e6d63' }}>
            {filtered.length} results
          </div>
        </div>
      </div>

      {/* Table */}
      <div style={{ flex: 1, padding: '24px 40px' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', tableLayout: 'fixed' }}>
          <colgroup>
            <col style={{ width: '260px' }} />
            <col style={{ width: '220px' }} />
            <col style={{ width: '180px' }} />
            <col />
          </colgroup>
          <thead>
            <tr style={{ borderBottom: '1px solid rgba(255,255,255,0.07)' }}>
              {['Token', 'Value', 'Category', ''].map(h => (
                <th key={h} style={{
                  padding: '10px 20px', textAlign: h === '' ? 'right' : 'left',
                  fontFamily: 'var(--font-mono)', fontSize: '10px',
                  color: '#484740', letterSpacing: '0.1em', textTransform: 'uppercase',
                  fontWeight: 500,
                }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((t, i) => <TokenRow key={t.token} token={t} even={i % 2 === 0} />)}
          </tbody>
        </table>
        {filtered.length === 0 && (
          <div style={{
            textAlign: 'center', padding: '80px',
            color: '#484740', fontFamily: 'var(--font-mono)', fontSize: '13px',
          }}>
            No tokens found for "{search}"
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{
        borderTop: '1px solid rgba(255,255,255,0.06)',
        padding: '20px 40px',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      }}>
        <span style={{ fontFamily: 'var(--font-mono)', fontSize: '11px', color: '#484740' }}>
          EurekaOrange Design System · v1.0.0 · {ALL_TOKENS.length} design tokens
        </span>
        <span style={{ fontFamily: 'var(--font-mono)', fontSize: '11px', color: '#484740' }}>
          CSS Custom Properties · JSON
        </span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

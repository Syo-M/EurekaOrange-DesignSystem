/* ── Duotone icon component ──────────────────────────── */
/* Each icon uses: primary (full opacity) + secondary (0.3 opacity) */
function DuoIcon({ paths, size = 24, primary, secondary }) {
  const p = primary || 'var(--jade)';
  const s = secondary || 'var(--jade-l)';
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
      {paths.map((path, i) => (
        path.type === 'fill' ? (
          <path key={i} d={path.d} fill={i === 0 ? s : p} opacity={i === 0 ? 0.3 : 1} />
        ) : path.type === 'circle' ? (
          <circle key={i} cx={path.cx} cy={path.cy} r={path.r}
            fill={i === 0 ? s : p} opacity={i === 0 ? 0.3 : 1} />
        ) : path.type === 'rect' ? (
          <rect key={i} x={path.x} y={path.y} width={path.w} height={path.h} rx={path.rx||0}
            fill={i === 0 ? s : p} opacity={i === 0 ? 0.3 : 1} />
        ) : (
          <path key={i} d={path.d}
            stroke={i === 0 ? s : p} strokeWidth={path.sw || 1.5}
            strokeLinecap="round" strokeLinejoin="round"
            opacity={i === 0 ? 0.35 : 1} fill="none" />
        )
      ))}
    </svg>
  );
}

    return matchCat && matchSearch;
  }), [activeCategory, search]);

  const catCount = (cat) => cat === 'All' ? ICONS.length : ICONS.filter(i => i.category === cat).length;

  const cardBg = bgMode === 'dark' ? '#1a1a17' : bgMode === 'light' ? '#f2f2ef' : '#0d0d0b';
  const cardBorder = bgMode === 'dark' ? 'rgba(255,255,255,0.07)' : bgMode === 'light' ? 'rgba(0,0,0,0.08)' : 'rgba(30,207,163,0.15)';

  /* SVG export */
  const exportSVG = (icon) => {
    const svgParts = icon.paths.map((path, i) => {
      const col = i === 0 ? secondaryColor : primaryColor;
      const op = i === 0 ? 0.3 : 1;
      if (path.type === 'fill') return `<path d="${path.d}" fill="${col}" opacity="${op}"/>`;
      if (path.type === 'circle') return `<circle cx="${path.cx}" cy="${path.cy}" r="${path.r}" fill="${col}" opacity="${op}"/>`;
      if (path.type === 'rect') return `<rect x="${path.x}" y="${path.y}" width="${path.w}" height="${path.h}" rx="${path.rx||0}" fill="${col}" opacity="${op}"/>`;
      return `<path d="${path.d}" stroke="${col}" stroke-width="${path.sw||1.5}" stroke-linecap="round" stroke-linejoin="round" opacity="${op}" fill="none"/>`;
    }).join('\n  ');
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">\n  ${svgParts}\n</svg>`;
    const blob = new Blob([svg], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `eo-icon-${icon.id}.svg`; a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div style={{ minHeight: '100vh' }}>
      {/* Nav */}
      <div style={{ position: 'sticky', top: 0, zIndex: 50, background: 'rgba(13,13,11,0.92)', backdropFilter: 'blur(20px)', borderBottom: '1px solid var(--border)', padding: '0 40px', height: '56px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
          <a href="EurekaOrange Design System.html" style={{ fontFamily: 'var(--fm)', fontSize: '12px', color: 'var(--t3)', textDecoration: 'none' }}>← Design System</a>
          <div style={{ width: '1px', height: '16px', background: 'var(--border)' }} />
          <span style={{ fontWeight: 600, fontSize: '14px' }}>Icon System</span>
          <span style={{ fontFamily: 'var(--fm)', fontSize: '10px', color: 'var(--jade)', background: 'rgba(30,207,163,0.1)', padding: '2px 8px', borderRadius: '12px', border: '1px solid rgba(30,207,163,0.2)' }}>
            {ICONS.length} Duotone icons
          </span>
        </div>
        {/* Controls */}
        <div style={{ display: 'flex', gap: '12px', alignItems: 'center' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
            <span style={{ fontFamily: 'var(--fm)', fontSize: '11px', color: 'var(--t3)' }}>Primary</span>
            <input type="color" value={primaryColor} onChange={e => setPrimaryColor(e.target.value)} style={{ width: '28px', height: '28px', borderRadius: '6px', border: 'none', cursor: 'pointer', background: 'none' }} />
            <span style={{ fontFamily: 'var(--fm)', fontSize: '11px', color: 'var(--t3)' }}>Secondary</span>
            <input type="color" value={secondaryColor} onChange={e => setSecondaryColor(e.target.value)} style={{ width: '28px', height: '28px', borderRadius: '6px', border: 'none', cursor: 'pointer' }} />
          </div>
          <div style={{ display: 'flex', background: 'var(--raised)', border: '1px solid var(--border)', borderRadius: '8px', padding: '3px', gap: '2px' }}>
            {[['dark','🌙'],['light','☀️'],['black','◼']].map(([m, icon]) => (
              <button key={m} onClick={() => setBgMode(m)} style={{ padding: '4px 10px', borderRadius: '5px', border: 'none', cursor: 'pointer', background: bgMode === m ? 'var(--jade)' : 'transparent', color: bgMode === m ? '#0d0d0b' : 'var(--t3)', fontSize: '12px' }}>{icon}</button>
            ))}
          </div>
          <input type="range" min="16" max="64" step="8" value={size} onChange={e => setSize(+e.target.value)} style={{ width: '80px', accentColor: 'var(--jade)' }} />
          <span style={{ fontFamily: 'var(--fm)', fontSize: '11px', color: 'var(--jade)', minWidth: '32px' }}>{size}px</span>
        </div>
      </div>

      <div style={{ padding: '40px' }}>
        {/* Header */}
        <div style={{ marginBottom: '40px', display: 'flex', gap: '24px', alignItems: 'flex-end', flexWrap: 'wrap' }}>
          <div>
            <div style={{ fontFamily: 'var(--fm)', fontSize: '11px', color: 'var(--jade)', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: '8px' }}>Duotone · 2-color</div>
            <h1 style={{ fontWeight: 700, fontSize: '40px', letterSpacing: '-0.03em', lineHeight: 1 }}>Icon System</h1>
          </div>
          <div style={{ display: 'flex', gap: '8px', alignItems: 'center', marginBottom: '4px' }}>
            <input placeholder="Search icons…" value={search} onChange={e => setSearch(e.target.value)}
              style={{ padding: '8px 16px', background: 'var(--raised)', border: '1px solid var(--border)', borderRadius: '8px', color: '#fff', fontFamily: 'var(--fm)', fontSize: '13px', outline: 'none', width: '200px' }}
            />
          </div>
        </div>

        {/* Category filter */}
        <div style={{ display: 'flex', gap: '8px', marginBottom: '32px', flexWrap: 'wrap' }}>
          {CATEGORIES.map(cat => (
            <button key={cat} onClick={() => setActiveCategory(cat)} style={{
              padding: '7px 18px', borderRadius: '999px', border: `1px solid ${activeCategory === cat ? 'rgba(30,207,163,0.4)' : 'var(--border)'}`,
              background: activeCategory === cat ? 'rgba(30,207,163,0.1)' : 'transparent',
              color: activeCategory === cat ? 'var(--jade)' : 'var(--t2)',
              fontFamily: 'var(--fd)', fontSize: '13px', fontWeight: 500, cursor: 'pointer',
              transition: 'all 0.18s',
            }}>
              {cat} <span style={{ fontFamily: 'var(--fm)', fontSize: '10px', opacity: 0.7 }}>({catCount(cat)})</span>
            </button>
          ))}
        </div>

        {/* Grid */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(120px, 1fr))', gap: '12px' }}>
          {filtered.map(icon => (
            <div key={icon.id}
              onClick={() => setSelected(icon)}
              style={{
                background: cardBg, border: `1px solid ${selected?.id === icon.id ? 'rgba(30,207,163,0.5)' : cardBorder}`,
                borderRadius: '14px', padding: '20px 16px 14px', cursor: 'pointer',
                display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '10px',
                transition: 'all 0.18s',
                boxShadow: selected?.id === icon.id ? '0 0 20px rgba(30,207,163,0.2)' : 'none',
              }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = 'rgba(30,207,163,0.35)'; e.currentTarget.style.transform = 'translateY(-2px)'; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = selected?.id === icon.id ? 'rgba(30,207,163,0.5)' : cardBorder; e.currentTarget.style.transform = 'translateY(0)'; }}
            >
              <DuoIcon paths={icon.paths} size={size} primary={primaryColor} secondary={secondaryColor} />
              <div style={{ fontFamily: 'var(--fm)', fontSize: '10px', color: bgMode === 'light' ? '#6e6d63' : 'var(--t3)', textAlign: 'center', lineHeight: 1.4 }}>{icon.name}</div>
            </div>
          ))}
        </div>

        {filtered.length === 0 && (
          <div style={{ textAlign: 'center', padding: '80px', color: 'var(--t4)', fontFamily: 'var(--fm)', fontSize: '13px' }}>
            No icons found for "{search}"
          </div>
        )}
      </div>

      {/* Detail panel */}
      {selected && (
        <div style={{ position: 'fixed', bottom: '24px', right: '24px', width: '280px', background: '#1a1a17', border: '1px solid rgba(30,207,163,0.3)', borderRadius: '20px', padding: '24px', boxShadow: '0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(30,207,163,0.1)', zIndex: 100 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '20px' }}>
            <div>
              <div style={{ fontWeight: 700, fontSize: '16px', marginBottom: '4px' }}>{selected.name}</div>
              <div style={{ fontFamily: 'var(--fm)', fontSize: '11px', color: 'var(--t3)' }}>eo-icon-{selected.id}</div>
            </div>
            <button onClick={() => setSelected(null)} style={{ background: 'rgba(255,255,255,0.06)', border: 'none', color: 'var(--t3)', cursor: 'pointer', width: '28px', height: '28px', borderRadius: '7px', fontSize: '14px' }}>×</button>
          </div>
          <div style={{ display: 'flex', gap: '12px', justifyContent: 'center', marginBottom: '20px' }}>
            {[16,24,32,48].map(s => (
              <div key={s} style={{ textAlign: 'center' }}>
                <DuoIcon paths={selected.paths} size={s} primary={primaryColor} secondary={secondaryColor} />
                <div style={{ fontFamily: 'var(--fm)', fontSize: '9px', color: 'var(--t4)', marginTop: '6px' }}>{s}px</div>
              </div>
            ))}
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '12px' }}>
              <span style={{ color: 'var(--t3)' }}>Category</span>
              <span style={{ color: 'var(--jade)', fontFamily: 'var(--fm)' }}>{selected.category}</span>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '12px' }}>
              <span style={{ color: 'var(--t3)' }}>Paths</span>
              <span style={{ fontFamily: 'var(--fm)', color: 'var(--t2)' }}>{selected.paths.length}</span>
            </div>
          </div>
          <button onClick={() => exportSVG(selected)} style={{ width: '100%', marginTop: '16px', padding: '10px', background: 'var(--jade)', color: '#0d0d0b', border: 'none', borderRadius: '10px', fontFamily: 'var(--fd)', fontWeight: 600, fontSize: '13px', cursor: 'pointer' }}>
            ↓ Export SVG
          </button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

/* ── Easing visualizer ──────────────────────────────────────── */
function EasingCurve({ value, size = 100 }) {
  const canvas = useRef(null);
  useEffect(() => {
    const ctx = canvas.current?.getContext('2d');
    if (!ctx) return;
    const s = size;
    ctx.clearRect(0, 0, s, s);
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      ctx.beginPath(); ctx.moveTo(i * s/4, 0); ctx.lineTo(i * s/4, s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i * s/4); ctx.lineTo(s, i * s/4); ctx.stroke();
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(0, s); ctx.lineTo(s, 0); ctx.stroke();
    ctx.setLineDash([]);

    const bezierPoints = {
      'cubic-bezier(0.16, 1, 0.3, 1)':     [0.16,1,0.3,1],
      'cubic-bezier(0.45, 0, 0.55, 1)':    [0.45,0,0.55,1],
      'cubic-bezier(0.34, 1.56, 0.64, 1)': [0.34,1.56,0.64,1],
      'cubic-bezier(0.4, 0, 1, 1)':         [0.4,0,1,1],
      'linear':                              null,
    };

    const pts = bezierPoints[value];
    ctx.strokeStyle = '#1ecfa3';
    ctx.lineWidth = 2;
    ctx.beginPath();
    if (!pts) {
      ctx.moveTo(0, s); ctx.lineTo(s, 0);
    } else {
      ctx.moveTo(0, s);
      ctx.bezierCurveTo(pts[0]*s, s - pts[1]*s, pts[2]*s, s - pts[3]*s, s, 0);
    }
    ctx.stroke();

    // control points
    if (pts) {
      [[pts[0],pts[1]],[pts[2],pts[3]]].forEach(([x,y]) => {
        ctx.fillStyle = 'rgba(30,207,163,0.5)';
        ctx.beginPath(); ctx.arc(x*s, s - y*s, 3.5, 0, Math.PI*2); ctx.fill();
      });
    }
  }, [value, size]);

  return <canvas ref={canvas} width={size} height={size} style={{ display: 'block' }} />;
}

/* ── Live animation demo ────────────────────────────────────── */
function AnimDemo({ name, animName, dur, ease, children }) {
  const [playing, setPlaying] = useState(false);
  const [key, setKey] = useState(0);
  const play = () => { setKey(k => k+1); setPlaying(true); setTimeout(() => setPlaying(false), (parseInt(dur)||300) + 100); };
  return (
    <div style={{ background: 'var(--raised)', border: '1px solid var(--border)', borderRadius: '14px', overflow: 'hidden' }}>
      <div style={{ padding: '20px', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', minHeight: '120px', position: 'relative' }}>
        <div key={key} style={playing ? { animation: `${animName} ${dur} ${ease} both` } : {}}>
          {children}
        </div>
      </div>
      <div style={{ borderTop: '1px solid var(--border)', padding: '12px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div>
          <div style={{ fontSize: '13px', fontWeight: 600 }}>{name}</div>
          <div style={{ fontFamily: 'var(--fm)', fontSize: '10px', color: 'var(--t3)', marginTop: '2px' }}>{dur} · {ease.split('(')[0]}</div>
        </div>
        <button onClick={play} style={{ width: '32px', height: '32px', borderRadius: '50%', background: playing ? 'rgba(30,207,163,0.1)' : 'var(--jade)', border: playing ? '1px solid rgba(30,207,163,0.3)' : 'none', color: playing ? 'var(--jade)' : '#0d0d0b', cursor: 'pointer', fontSize: '14px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          {playing ? '●' : '▶'}
        </button>
      </div>
    </div>
  );
}

/* ── Transition demo ────────────────────────────────────────── */
function TransitionDemo() {

        <button

          onMouseLeave={() => setHovered(false)}
          style={{
            padding: '12px 28px', borderRadius: '8px', border: 'none', cursor: 'pointer',
            background: hovered ? 'var(--jade-l)' : 'var(--jade)',
            color: '#0d0d0b', fontFamily: 'var(--fd)', fontWeight: 600, fontSize: '14px',

            boxShadow: hovered ? '0 8px 24px rgba(30,207,163,0.4)' : '0 0 0 rgba(30,207,163,0)',
            transition: 'all 150ms cubic-bezier(0.16,1,0.3,1)',
          }}>
          Hover me
        </button>
      </div>

      {/* Toggle */}
      <div style={{ background: 'var(--raised)', border: '1px solid var(--border)', borderRadius: '14px', padding: '24px', display: 'flex', flexDirection: 'column', gap: '12px' }}>
        <div style={{ fontFamily: 'var(--fm)', fontSize: '11px', color: 'var(--t3)' }}>// Toggle · 220ms spring</div>
        <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
          <div onClick={() => setToggled(!toggled)} style={{
            width: '52px', height: '28px', borderRadius: '14px', cursor: 'pointer',
            background: toggled ? 'var(--jade)' : 'var(--overlay)',
            border: `1px solid ${toggled ? 'transparent' : 'rgba(255,255,255,0.1)'}`,
            position: 'relative', transition: 'background 220ms cubic-bezier(0.16,1,0.3,1)',
            boxShadow: toggled ? '0 0 16px rgba(30,207,163,0.4)' : 'none',
          }}>
            <div style={{
              position: 'absolute', top: '4px', left: toggled ? '28px' : '4px',
              width: '18px', height: '18px', borderRadius: '50%', background: '#fff',
              transition: 'left 220ms cubic-bezier(0.34,1.56,0.64,1)',
              boxShadow: '0 1px 4px rgba(0,0,0,0.3)',
            }} />
          </div>
          <span style={{ fontSize: '14px', color: toggled ? 'var(--jade)' : 'var(--t3)' }}>
            {toggled ? 'Enabled' : 'Disabled'}
          </span>
        </div>
      </div>

      {/* Expanding card */}
      <div style={{ background: 'var(--raised)', border: '1px solid var(--border)', borderRadius: '14px', padding: '24px', gridColumn: '1/-1' }}>
        <div style={{ fontFamily: 'var(--fm)', fontSize: '11px', color: 'var(--t3)', marginBottom: '16px' }}>// Expand / Collapse · 350ms ease-in-out</div>
        <div style={{

              ▾

        </div>

/* ── Reduced motion section ─────────────────────────────────── */
function ReducedMotionSection() {
  return (

        <div>
          <div style={{ fontWeight: 700, fontSize: '16px', marginBottom: '4px' }}>prefers-reduced-motion</div>
          <div style={{ fontSize: '14px', color: '#9b9a91', lineHeight: 1.6 }}>OSの「視差効果を減らす」設定を検出。対象ユーザー：てんかん、前庭障害、乗り物酔いしやすい方。</div>
        </div>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
        <div>
          <div style={{ fontFamily: 'var(--fm)', fontSize: '11px', color: '#c084fc', marginBottom: '10px' }}>✓ DO — CSS</div>
          <pre style={{ fontFamily: 'var(--fm)', fontSize: '12px', color: '#c8c7c0', background: '#080807', padding: '16px', borderRadius: '10px', lineHeight: 1.7, overflow: 'auto', border: '1px solid rgba(255,255,255,0.06)' }}>{`@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}`}</pre>
        </div>
        <div>
          <div style={{ fontFamily: 'var(--fm)', fontSize: '11px', color: '#c084fc', marginBottom: '10px' }}>✓ DO — React Hook</div>
          <pre style={{ fontFamily: 'var(--fm)', fontSize: '12px', color: '#c8c7c0', background: '#080807', padding: '16px', borderRadius: '10px', lineHeight: 1.7, overflow: 'auto', border: '1px solid rgba(255,255,255,0.06)' }}>{`function useReducedMotion() {
  const [reduced, setReduced] =
    useState(false);
  useEffect(() => {
    const mq = matchMedia(
      '(prefers-reduced-motion: reduce)'
    );
    setReduced(mq.matches);
    mq.addEventListener('change', e =>
      setReduced(e.matches));
  }, []);
  return reduced;
}`}</pre>
        </div>
      </div>
    </div>
  );
}

}

                <div style={{ fontWeight: 700, fontSize: '18px', letterSpacing: '-0.02em', marginBottom: '4px' }}>{p.title}</div>
                <div style={{ fontFamily: 'var(--fm)', fontSize: '11px', color: 'var(--jade)', marginBottom: '12px', letterSpacing: '0.06em' }}>{p.ja}</div>
                <div style={{ fontSize: '14px', color: 'var(--t2)', lineHeight: 1.75 }}>{p.body}</div>
              </div>
            ))}
          </div>
        </section>

        {/* 02 Duration */}
        <section style={{ marginBottom: '80px' }}>
          <SL num="02">Duration Scale</SL>
          <div style={{ background: 'var(--raised)', border: '1px solid var(--border)', borderRadius: '16px', overflow: 'hidden' }}>
            {DURATION.map((d, i) => (
              <div key={d.token} style={{ display: 'grid', gridTemplateColumns: '220px 1fr auto', alignItems: 'center', gap: '20px', padding: '18px 28px', borderBottom: i < DURATION.length-1 ? '1px solid var(--border)' : 'none' }}>
                <div>
                  <div style={{ fontFamily: 'var(--fm)', fontSize: '12px', color: 'var(--jade)', marginBottom: '3px' }}>{d.token}</div>
                  <div style={{ fontFamily: 'var(--fm)', fontSize: '11px', color: 'var(--t4)' }}>{d.use}</div>
                </div>
                {/* Animated bar */}
                <div style={{ height: '6px', background: 'rgba(255,255,255,0.04)', borderRadius: '3px', overflow: 'hidden' }}>
                  <div style={{
                    height: '100%', background: 'var(--jade)',
                    borderRadius: '3px',
                    animation: `eo-type ${d.value} cubic-bezier(0.16,1,0.3,1) infinite alternate`,
                    boxShadow: '0 0 8px rgba(30,207,163,0.5)',
                  }} />
                </div>
                <div style={{ fontFamily: 'var(--fm)', fontSize: '20px', fontWeight: 700, color: 'var(--t1)', letterSpacing: '-0.03em', textAlign: 'right', minWidth: '72px' }}>{d.value}</div>
              </div>
            ))}
          </div>
        </section>

        {/* 03 Easing */}
        <section style={{ marginBottom: '80px' }}>
          <SL num="03">Easing Curves</SL>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
            {EASING.map(e => (
              <div key={e.token} style={{ background: 'var(--raised)', border: '1px solid var(--border)', borderRadius: '16px', padding: '24px', display: 'grid', gridTemplateColumns: '100px 1fr auto', gap: '24px', alignItems: 'center' }}>
                <EasingCurve value={e.value} size={100} />
                <div>
                  <div style={{ fontWeight: 600, fontSize: '16px', marginBottom: '6px' }}>{e.label}</div>
                  <div style={{ fontFamily: 'var(--fm)', fontSize: '12px', color: 'var(--jade)', marginBottom: '8px' }}>{e.token}</div>
                  <div style={{ fontSize: '13px', color: 'var(--t2)', lineHeight: 1.6 }}>{e.desc}</div>
                </div>
                <div style={{ textAlign: 'right' }}>
                  <div style={{ fontFamily: 'var(--fm)', fontSize: '11px', color: 'var(--t4)', background: 'rgba(255,255,255,0.03)', padding: '8px 12px', borderRadius: '8px', border: '1px solid var(--border)', whiteSpace: 'nowrap', maxWidth: '220px', wordBreak: 'break-all', lineHeight: 1.6 }}>{e.value}</div>
                </div>
              </div>
            ))}
          </div>
        </section>

        {/* 04 Animation demos */}
        <section style={{ marginBottom: '80px' }}>
          <SL num="04">Animation Demos</SL>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: '16px', marginBottom: '24px' }}>
            <AnimDemo name="Elastic Enter" animName="eo-elastic" dur="500ms" ease="cubic-bezier(0.34,1.56,0.64,1)">
              <div style={{ width: '48px', height: '48px', borderRadius: '12px', background: 'var(--jade)', boxShadow: '0 0 20px rgba(30,207,163,0.4)' }} />
            </AnimDemo>
            <AnimDemo name="Slide Up" animName="eo-slide-up" dur="300ms" ease="cubic-bezier(0.16,1,0.3,1)">
              <div style={{ padding: '12px 20px', background: 'var(--overlay)', border: '1px solid var(--border)', borderRadius: '10px', fontSize: '13px' }}>Card appears</div>
            </AnimDemo>
            <AnimDemo name="Fade + Blur" animName="eo-fade-blur" dur="400ms" ease="cubic-bezier(0.16,1,0.3,1)">
              <div style={{ fontWeight: 700, fontSize: '24px', letterSpacing: '-0.03em', color: 'var(--jade)' }}>Eureka!</div>
            </AnimDemo>
            <AnimDemo name="Pulse Glow" animName="eo-pulse" dur="1s" ease="ease-in-out">
              <div style={{ width: '44px', height: '44px', borderRadius: '50%', background: 'var(--jade)' }} />
            </AnimDemo>
            <AnimDemo name="Morph" animName="eo-morph" dur="800ms" ease="cubic-bezier(0.45,0,0.55,1)">
              <div style={{ width: '44px', height: '44px', background: 'var(--jade)', opacity: 0.8 }} />
            </AnimDemo>
            <AnimDemo name="Float" animName="eo-float" dur="3s" ease="ease-in-out">
              <div style={{ width: '44px', height: '44px', borderRadius: '12px', background: 'linear-gradient(135deg, var(--jade), var(--jade-d))', boxShadow: '0 8px 24px rgba(30,207,163,0.3)' }} />
            </AnimDemo>
          </div>

          {/* Typewriter */}
          <div style={{ background: 'var(--raised)', border: '1px solid var(--border)', borderRadius: '14px', padding: '28px' }}>
            <div style={{ fontFamily: 'var(--fm)', fontSize: '11px', color: 'var(--t3)', marginBottom: '16px' }}>// Typewriter · overflow hidden + width animation</div>
            <div style={{ fontFamily: 'var(--fm)', fontSize: '22px', fontWeight: 500, color: 'var(--jade)', overflow: 'hidden', whiteSpace: 'nowrap', width: '0', animation: 'eo-type 2s steps(28) infinite alternate' }}>
              const eureka = 'discovery';
            </div>
            <div style={{ display: 'inline-block', width: '2px', height: '24px', background: 'var(--jade)', verticalAlign: 'bottom', animation: 'eo-blink 1s step-end infinite' }} />
          </div>
        </section>

        {/* 05 Transition demos */}
        <section style={{ marginBottom: '80px' }}>
          <SL num="05">UI Transitions</SL>
          <TransitionDemo />
        </section>

        {/* 06 Reduced motion */}
        <section style={{ marginBottom: '80px' }}>
          <SL num="06">Accessibility</SL>
          <ReducedMotionSection />
        </section>

        {/* 07 Token export */}
        <section>
          <SL num="07">CSS Token Export</SL>
          <div style={{ background: '#080807', border: '1px solid var(--border)', borderRadius: '16px', padding: '28px' }}>
            <div style={{ fontFamily: 'var(--fm)', fontSize: '11px', color: 'var(--t4)', marginBottom: '16px' }}>eureka-orange-motion-tokens.css</div>
            <pre style={{ fontFamily: 'var(--fm)', fontSize: '12px', color: '#c8c7c0', lineHeight: 1.8, overflow: 'auto' }}>{`:root {
  /* Duration */
  --duration-instant: 80ms;
  --duration-fast:    150ms;
  --duration-normal:  220ms;
  --duration-slow:    350ms;
  --duration-crawl:   500ms;

  /* Easing */
  --ease-out:     cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out:  cubic-bezier(0.45, 0, 0.55, 1);
  --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-in:      cubic-bezier(0.4, 0, 1, 1);
  --ease-linear:  linear;

  /* Shorthand */
  --transition-fast:   150ms cubic-bezier(0.16, 1, 0.3, 1);
  --transition-normal: 220ms cubic-bezier(0.16, 1, 0.3, 1);
  --transition-slow:   350ms cubic-bezier(0.45, 0, 0.55, 1);
  --transition-spring: 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}`}</pre>
          </div>
        </section>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

<html lang="ja">
<head>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* === EUREKA ORANGE — DESIGN TOKENS === */

    /* Primary — Eureka (Jade Color Scale) */
    --eo-orange-50:  #e8fdf6;
    --eo-orange-100: #c4f7e8;
    --eo-orange-200: #8eefd4;
    --eo-orange-300: #52e2bc;
    --eo-orange-400: #1ecfa3;
    --eo-orange-500: #0fb389;
    --eo-orange-600: #098f6d;
    --eo-orange-700: #066b51;
    --eo-orange-800: #034636;
    --eo-orange-900: #01231b;

    /* Neutral — Ink */
    --eo-ink-0:   #ffffff;
    --eo-ink-50:  #f5f5f3;
    --eo-ink-100: #e8e7e3;
    --eo-ink-200: #c8c7c0;
    --eo-ink-300: #9b9a91;
    --eo-ink-400: #6e6d63;
    --eo-ink-500: #484740;
    --eo-ink-600: #2e2d28;
    --eo-ink-700: #1c1b18;
    --eo-ink-800: #111110;
    --eo-ink-900: #080807;

    /* Status */
    --eo-success: #22c55e;
    --eo-warning: #f59e0b;
    --eo-error:   #ef4444;
    --eo-info:    #3b82f6;

    /* Accent */
    --eo-electric: #a855f7;
    --eo-acid:     #84cc16;
    --eo-ice:      #06b6d4;

    /* Typography */
    --font-display: 'Space Grotesk', sans-serif;
    --font-mono:    'DM Mono', monospace;
    --font-code:    'Space Mono', monospace;

    /* Type Scale */
    --text-xs:   0.75rem;
    --text-sm:   0.875rem;
    --text-base: 1rem;
    --text-lg:   1.125rem;
    --text-xl:   1.25rem;
    --text-2xl:  1.5rem;
    --text-3xl:  1.875rem;
    --text-4xl:  2.25rem;
    --text-5xl:  3rem;
    --text-6xl:  3.75rem;
    --text-7xl:  4.5rem;
    --text-8xl:  6rem;

    /* Spacing */
    --space-1:  0.25rem;
    --space-2:  0.5rem;
    --space-3:  0.75rem;
    --space-4:  1rem;
    --space-5:  1.25rem;
    --space-6:  1.5rem;
    --space-8:  2rem;
    --space-10: 2.5rem;
    --space-12: 3rem;
    --space-16: 4rem;
    --space-20: 5rem;
    --space-24: 6rem;
    --space-32: 8rem;

    /* Border Radius */
    --radius-sm:   4px;
    --radius-md:   8px;
    --radius-lg:   12px;
    --radius-xl:   20px;
    --radius-2xl:  32px;
    --radius-full: 9999px;

    /* Shadows */
    --shadow-sm:   0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
    --shadow-md:   0 4px 12px rgba(0,0,0,0.5), 0 2px 4px rgba(0,0,0,0.3);
    --shadow-lg:   0 10px 30px rgba(0,0,0,0.6), 0 4px 8px rgba(0,0,0,0.3);
    --shadow-xl:   0 20px 60px rgba(0,0,0,0.7);
    --shadow-glow: 0 0 40px rgba(30,207,163,0.35), 0 0 80px rgba(30,207,163,0.15);
    --shadow-glow-sm: 0 0 16px rgba(30,207,163,0.4);

    /* Surfaces */
    --surface-bg:      #0d0d0b;
    --surface-base:    #131311;
    --surface-raised:  #1a1a17;
    --surface-overlay: #222220;
    --surface-border:  rgba(255,255,255,0.07);

    /* Current theme (dark default) */
    --bg:        var(--surface-bg);
    --surface:   var(--surface-base);
    --border:    var(--surface-border);
    --text-primary:   var(--eo-ink-0);
    --text-secondary: var(--eo-ink-300);
    --text-tertiary:  var(--eo-ink-500);
    --accent:    var(--eo-orange-400);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-display);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.6;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.6;
  }

  #root { position: relative; z-index: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface-base); }
  ::-webkit-scrollbar-thumb { background: var(--eo-ink-600); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--eo-orange-500); }

  /* Selection */
  ::selection { background: rgba(30,207,163,0.3); color: #fff; }
</style>
</head>

    { name: 'orange-500', value: '#0fb389', label: '500' },

    { name: 'ink-400', value: '#6e6d63', label: '400' },
    { name: 'ink-500', value: '#484740', label: '500' },
    { name: 'ink-600', value: '#2e2d28', label: '600' },
    { name: 'ink-700', value: '#1c1b18', label: '700' },
    { name: 'ink-800', value: '#111110', label: '800' },
    { name: 'ink-900', value: '#080807', label: '900' },
  ],
  status: [
    { name: 'success', value: '#22c55e', label: 'Success' },
    { name: 'warning', value: '#f59e0b', label: 'Warning' },
    { name: 'error',   value: '#ef4444', label: 'Error' },

  accent: [

    { name: 'acid',     value: '#84cc16', label: 'Acid' },

const TYPE_SCALE = [
  { token: '--text-xs',   size: '12px / 0.75rem',   usage: 'Labels, badges, captions' },
  { token: '--text-sm',   size: '14px / 0.875rem',  usage: 'Body small, metadata' },
  { token: '--text-base', size: '16px / 1rem',      usage: 'Body default, inputs' },
  { token: '--text-lg',   size: '18px / 1.125rem',  usage: 'Body large, card titles' },
  { token: '--text-xl',   size: '20px / 1.25rem',   usage: 'Section labels' },
  { token: '--text-2xl',  size: '24px / 1.5rem',    usage: 'H4, subheadings' },
  { token: '--text-3xl',  size: '30px / 1.875rem',  usage: 'H3' },
  { token: '--text-4xl',  size: '36px / 2.25rem',   usage: 'H2' },
  { token: '--text-5xl',  size: '48px / 3rem',      usage: 'H1, page titles' },
  { token: '--text-6xl',  size: '60px / 3.75rem',   usage: 'Hero large' },

  { token: '--text-8xl',  size: '96px / 6rem',      usage: 'Display XL, brand moments' },
];

const SPACING = [

  { token: '--space-3',  value: '12px', px: 12 },
  { token: '--space-4',  value: '16px', px: 16 },
  { token: '--space-5',  value: '20px', px: 20 },
  { token: '--space-6',  value: '24px', px: 24 },
  { token: '--space-8',  value: '32px', px: 32 },
  { token: '--space-10', value: '40px', px: 40 },
  { token: '--space-12', value: '48px', px: 48 },
  { token: '--space-16', value: '64px', px: 64 },
  { token: '--space-20', value: '80px', px: 80 },
  { token: '--space-24', value: '96px', px: 96 },
];

const SHADOWS = [
  { name: 'sm',      token: '--shadow-sm',      css: '0 1px 3px rgba(0,0,0,0.4)' },
  { name: 'md',      token: '--shadow-md',      css: '0 4px 12px rgba(0,0,0,0.5)' },
  { name: 'lg',      token: '--shadow-lg',      css: '0 10px 30px rgba(0,0,0,0.6)' },
  { name: 'xl',      token: '--shadow-xl',      css: '0 20px 60px rgba(0,0,0,0.7)' },
  { name: 'glow',    token: '--shadow-glow',    css: '0 0 40px rgba(30,207,163,0.35)', orange: true },
  { name: 'glow-sm', token: '--shadow-glow-sm', css: '0 0 16px rgba(30,207,163,0.4)',  orange: true },
];

const RADII = [
  { name: 'sm',   token: '--radius-sm',   value: '4px',     px: 4 },
  { name: 'md',   token: '--radius-md',   value: '8px',     px: 8 },
  { name: 'lg',   token: '--radius-lg',   value: '12px',    px: 12 },
  { name: 'xl',   token: '--radius-xl',   value: '20px',    px: 20 },
  { name: '2xl',  token: '--radius-2xl',  value: '32px',    px: 32 },
  { name: 'full', token: '--radius-full', value: '9999px',  px: 9999 },

// ── Small utilities ──────────────────────────────────────────────────────────
function isLight(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (r*0.299 + g*0.587 + b*0.114) > 128;
}

function CopyBadge({ text }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    navigator.clipboard?.writeText(text).catch(()=>{});
    setCopied(true);
    setTimeout(()=>setCopied(false), 1500);
  };
  return (
    <button onClick={copy} style={{
      background: 'none', border: 'none', cursor: 'pointer',
      fontFamily: 'var(--font-mono)', fontSize: '11px',
      color: copied ? 'var(--eo-orange-400)' : 'var(--eo-ink-400)',
      padding: '2px 4px', borderRadius: '3px',
      transition: 'color 0.2s',
    }}>
      {copied ? '✓ copied' : text}
    </button>
  );
}

        width: '6px', height: '6px', borderRadius: '50%',

      <span style={{

        letterSpacing: '0.12em', textTransform: 'uppercase',
        color: 'var(--eo-orange-400)',
      }}>{children}</span>
      <div style={{ flex: 1, height: '1px', background: 'var(--border)' }}></div>
    </div>
  );
}

// ── Nav ──────────────────────────────────────────────────────────────────────
const NAV_ITEMS = ['Colors','Typography','Spacing','Shadows','Components','Brand'];

function Nav() {
  const [active, setActive] = useState('Colors');
  useEffect(() => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if(e.isIntersecting) setActive(e.target.dataset.section); });
    }, { rootMargin: '-40% 0px -50% 0px' });
    NAV_ITEMS.forEach(id => {
      const el = document.getElementById(id);
      if(el) obs.observe(el);
    });
    return () => obs.disconnect();
  }, []);

  return (
    <nav style={{
      position: 'fixed', top: 0, left: 0, right: 0,
      zIndex: 100,
      background: 'rgba(13,13,11,0.85)',
      backdropFilter: 'blur(20px)',
      borderBottom: '1px solid var(--border)',
      padding: '0 40px',
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      height: '56px',
    }}>
      {/* Logo */}
      <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="13" stroke="#1ecfa3" strokeWidth="1.5"/>
          <path d="M9 10 L14 7 L19 10 L19 18 L14 21 L9 18 Z" fill="#1ecfa3" opacity="0.15"/>
          <path d="M14 7 L19 10 L19 18" stroke="#1ecfa3" strokeWidth="1.5" fill="none" strokeLinecap="round"/>
          <path d="M9 10 L14 7" stroke="#52e2bc" strokeWidth="1.5" strokeLinecap="round"/>
          <circle cx="14" cy="14" r="2.5" fill="#1ecfa3"/>
          <line x1="14" y1="10" x2="14" y2="11.5" stroke="#8eefd4" strokeWidth="1" strokeLinecap="round"/>

          fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: '15px',
          letterSpacing: '-0.02em',
        }}>EurekaOrange</span>
        <span style={{
          fontFamily: 'var(--font-mono)', fontSize: '10px',
          color: 'var(--eo-ink-400)', letterSpacing: '0.05em',
        }}>/ Design System v1.0</span>
      </div>

      {/* Nav links */}
      <div style={{ display: 'flex', gap: '2px', alignItems: 'center' }}>
        {NAV_ITEMS.map(item => (
          <a key={item} href={`#${item}`} style={{
            fontFamily: 'var(--font-display)', fontSize: '13px', fontWeight: 500,

            textDecoration: 'none', padding: '6px 14px', borderRadius: '6px',
            background: active === item ? 'rgba(30,207,163,0.08)' : 'transparent',
            transition: 'all 0.2s',

        ))}
        <div style={{ width: '1px', height: '16px', background: 'var(--border)', margin: '0 6px' }} />

          { href: 'tokens.html',            label: 'Tokens' },
          { href: 'light-mode-tokens.html', label: 'Light Mode' },
          { href: 'motion.html',            label: 'Motion' },
          { href: 'brand-assets.html',      label: 'Brand' },
        ].map(link => (
          <a key={link.href} href={link.href} style={{
            fontFamily: 'var(--font-mono)', fontSize: '11px', fontWeight: 500,
            color: 'var(--eo-ink-400)', textDecoration: 'none',
            padding: '5px 12px', borderRadius: '6px',
            border: '1px solid var(--border)', transition: 'all 0.2s',
            letterSpacing: '0.03em',
          }}>{link.label}</a>
        ))}
      </div>
    </nav>
  );
}

        <div style={{ display: 'flex', gap: '12px', alignItems: 'center' }}>
          <a href="#Colors" style={{
            display: 'inline-flex', alignItems: 'center', gap: '8px',
            background: 'var(--eo-orange-400)', color: '#0d0d0b',
            fontFamily: 'var(--font-display)', fontSize: '14px', fontWeight: 600,
            padding: '12px 24px', borderRadius: '8px', textDecoration: 'none',
            transition: 'all 0.2s',
          }}>
            Explore →
          </a>
          <a href="tokens.html" style={{
            display: 'inline-flex', alignItems: 'center', gap: '8px',

        position: 'absolute', bottom: '48px', left: '80px',

          { n: '10', label: 'Color stops' },

          { n: '12', label: 'Spacing tokens' },
          { n: '6',  label: 'Shadow layers' },
        ].map(s => (
          <div key={s.label}>
            <div style={{
              fontFamily: 'var(--font-display)', fontSize: '28px', fontWeight: 700,

}

// ── Colors Section ───────────────────────────────────────────────────────────
function ColorSwatch({ color }) {
  const [copied, setCopied] = useState(false);
  const light = isLight(color.value);
  const copy = () => {
    navigator.clipboard?.writeText(color.value).catch(()=>{});
    setCopied(true);
    setTimeout(()=>setCopied(false), 1500);
  };
  return (
    <button onClick={copy} style={{
      background: 'none', border: 'none', cursor: 'pointer', textAlign: 'left',
      padding: 0, width: '100%',
    }}>
      <div style={{

// ── Tweaks ───────────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#1ecfa3",
  "darkMode": true,
  "fontScale": 1,
  "borderRadius": "medium"
}/*EDITMODE-END*/;

function TweaksApp() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty('--eo-orange-400', tweaks.accentColor);
    root.style.setProperty('--accent', tweaks.accentColor);

    if (!tweaks.darkMode) {
      root.style.setProperty('--bg', '#f5f5f3');
      root.style.setProperty('--surface', '#ffffff');
      root.style.setProperty('--surface-raised', '#f5f5f3');
      root.style.setProperty('--border', 'rgba(0,0,0,0.08)');
      root.style.setProperty('--text-primary', '#111110');
      root.style.setProperty('--text-secondary', '#484740');
      root.style.setProperty('--text-tertiary', '#9b9a91');
    } else {
      root.style.setProperty('--bg', '#0d0d0b');
      root.style.setProperty('--surface', '#131311');
      root.style.setProperty('--surface-raised', '#1a1a17');
      root.style.setProperty('--border', 'rgba(255,255,255,0.07)');
      root.style.setProperty('--text-primary', '#ffffff');
      root.style.setProperty('--text-secondary', '#9b9a91');
      root.style.setProperty('--text-tertiary', '#484740');
    }

    const rMap = { small: '4px', medium: '8px', large: '16px' };
    root.style.setProperty('--radius-md', rMap[tweaks.borderRadius] || '8px');
  }, [tweaks]);

  return (
    <TweaksPanel>
      <TweakColor label="Accent Color" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
      <TweakToggle label="Dark Mode" value={tweaks.darkMode} onChange={v => setTweak('darkMode', v)} />
      <TweakSlider label="Font Scale" min={0.8} max={1.3} step={0.05} value={tweaks.fontScale} onChange={v => setTweak('fontScale', v)} />
      <TweakRadio label="Border Radius" options={['small','medium','large']} value={tweaks.borderRadius} onChange={v => setTweak('borderRadius', v)} />
    </TweaksPanel>
  );
}
